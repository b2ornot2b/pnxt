name: Validate Website Build

on:
  pull_request:
    paths:
      - 'website/**'
      - 'docs/**'
      - 'README.md'
      - 'status.md'
      - 'AGENTS.md'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./website
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build website
        run: npm run build
